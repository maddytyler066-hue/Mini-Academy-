<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Academy+</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Inter",sans-serif;
  background:#050505;
  color:white;
  overflow-x:hidden;
  line-height:1.6;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left,#3b82f620,transparent 30%),
    radial-gradient(circle at bottom right,#8b5cf620,transparent 30%);
  z-index:-10;
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.03);
  border-bottom:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(18px);
  z-index:999;
  gap:12px;
}

.logo{
  font-size:1.35rem;
  font-weight:800;
  white-space:nowrap;
}

.nav-links{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.nav-links a{
  text-decoration:none;
  color:#cfcfcf;
  transition:0.2s;
  font-size:0.95rem;
}

.nav-links a:hover{
  color:white;
}

.nav-btn{
  padding:10px 18px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:0.25s;
  font-size:0.95rem;
  white-space:nowrap;
}

/* SCREENS */
.screen{
  display:none;
}

.active{
  display:block;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:110px 20px 80px;
  text-align:center;
}

.hero-content{
  max-width:1000px;
  position:relative;
  z-index:2;
}

.hero-badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  margin-bottom:20px;
  color:#d1d1d1;
  font-size:0.9rem;
}

.hero h1{
  font-size:3.8rem;
  line-height:1.05;
  margin-bottom:20px;
  font-weight:800;
  letter-spacing:-2px;
}

.hero p{
  color:#b8b8b8;
  font-size:1.1rem;
  max-width:680px;
  margin:auto;
}

.hero-buttons{
  margin-top:30px;
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
}

.primary-btn,
.secondary-btn{
  padding:14px 26px;
  border:none;
  border-radius:16px;
  cursor:pointer;
  font-size:1rem;
  transition:0.25s;
  flex:1;
  max-width:220px;
}

.primary-btn{
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:white;
}

.secondary-btn{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
}

/* STATS */
.stats-grid{
  display:flex;
  gap:24px;
  justify-content:center;
  margin-top:50px;
  flex-wrap:wrap;
}

.stat-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:18px 24px;
  min-width:120px;
  text-align:center;
}

.stat-card h2{
  font-size:2rem;
  margin-bottom:4px;
}

/* COURSES & CATEGORIES */
#coursesPage, #categoriesPage, #courseDetail{
  padding:110px 20px 60px;
}

.back-btn{
  margin-bottom:25px;
  padding:10px 18px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
  font-size:0.95rem;
}

.courses-title{
  font-size:2.4rem;
  margin-bottom:20px;
}

.search-bar{
  width:100%;
  padding:16px 20px;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  color:white;
  outline:none;
  margin-bottom:25px;
  font-size:1rem;
}

.filter-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:30px;
  overflow-x:auto;
  padding-bottom:8px;
}

.filter-btn{
  padding:10px 18px;
  border:none;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
  white-space:nowrap;
  font-size:0.9rem;
}

.active-filter{
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
}

.course-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}

.course-card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  overflow:hidden;
  transition:0.25s;
  backdrop-filter:blur(18px);
}

.course-card:hover{
  transform:translateY(-6px);
}

.course-card iframe{
  width:100%;
  height:200px;
  border:none;
}

.course-content{
  padding:20px;
}

.course-category{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
  margin-bottom:12px;
  color:#cfcfcf;
  font-size:0.8rem;
}

.course-card h3{
  font-size:1.25rem;
  margin-bottom:8px;
}

.course-desc{
  color:#b8b8b8;
  line-height:1.5;
  margin-bottom:16px;
  font-size:0.95rem;
}

/* Category Cards */
.category-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}

.category-card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:36px 24px;
  text-align:center;
  transition:0.25s;
  cursor:pointer;
}

.category-card:hover {
  transform:translateY(-8px);
}

.category-card h2 {
  font-size:2.6rem;
  margin-bottom:8px;
}

/* COURSE DETAIL */
#detailContent iframe{
  border-radius:16px 16px 0 0;
}

/* RESPONSIVE */
@media (max-width: 640px) {
  .navbar{
    padding:14px 16px;
    flex-direction:column;
    gap:12px;
  }
  
  .nav-links{
    gap:16px;
    width:100%;
    justify-content:center;
  }
  
  .hero{
    padding:100px 16px 60px;
  }
  
  .hero h1{
    font-size:2.8rem;
  }
  
  .hero p{
    font-size:1rem;
  }
  
  .hero-buttons{
    flex-direction:column;
    align-items:center;
  }
  
  .primary-btn, .secondary-btn{
    max-width:100%;
    width:100%;
  }
  
  .stats-grid{
    gap:16px;
  }
  
  .stat-card{
    min-width:100px;
    padding:14px 16px;
  }
  
  #coursesPage, #categoriesPage, #courseDetail{
    padding:100px 16px 40px;
  }
  
  .courses-title{
    font-size:2.1rem;
  }
  
  .course-grid{
    grid-template-columns:1fr;
  }
  
  .category-grid{
    grid-template-columns:1fr;
  }
  
  .course-card iframe{
    height:180px;
  }
}

@media (max-width: 480px) {
  .hero h1{
    font-size:2.5rem;
  }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">🎓 Mini Academy+</div>
  <div class="nav-links">
    <a onclick="goHome()">Home</a>
    <a onclick="goToCategories()">Courses</a>
  </div>
  <button class="nav-btn" onclick="goToCategories()">Start Learning</button>
</nav>

<!-- HOME -->
<section id="home" class="screen active hero">
  <div class="hero-content">
    <div class="hero-badge">🚀 Modern Learning Platform</div>
    <h1>Eat Skills <br>That Matter.</h1>
    <p>Coding, AI, video editing, cooking, design, music, freelancing, fitness and more — all in one premium platform.</p>

    <div class="hero-buttons">
      <button class="primary-btn" onclick="goToCategories()">Explore Courses</button>
      <button class="secondary-btn">Watch Demo</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><h2>180+</h2><p>Courses</p></div>
      <div class="stat-card"><h2>25K+</h2><p>Students</p></div>
      <div class="stat-card"><h2>40+</h2><p>Categories</p></div>
    </div>
  </div>
</section>

<!-- CATEGORIES PAGE -->
<div id="categoriesPage" class="screen">
  <button class="back-btn" onclick="goHome()">← Back</button>
  <h1 class="courses-title">Course Categories</h1>
  <div id="categoryList" class="category-grid"></div>
</div>

<!-- ALL COURSES PAGE -->
<div id="coursesPage" class="screen">
  <button class="back-btn" onclick="goToCategories()">← Back to Categories</button>
  <h1 class="courses-title">All Courses</h1>

  <input class="search-bar" id="searchInput" placeholder="Search courses..." onkeyup="renderAllCourses()">

  <div class="filter-row">
    <button class="filter-btn active-filter" onclick="setFilter('All', this)">All</button>
    <button class="filter-btn" onclick="setFilter('Coding', this)">Coding</button>
    <button class="filter-btn" onclick="setFilter('AI', this)">AI</button>
    <button class="filter-btn" onclick="setFilter('Video Editing', this)">Video Editing</button>
    <button class="filter-btn" onclick="setFilter('Business', this)">Business</button>
  </div>

  <div id="courseList" class="course-grid"></div>
</div>

<!-- COURSE DETAIL PAGE -->
<div id="courseDetail" class="screen">
  <button class="back-btn" onclick="goToCoursesPage()">← Back to Courses</button>
  <div id="detailContent"></div>
</div>

<script>
// Courses Data
const courses = [
  { id:1, title:"HTML Full Course", category:"Coding", youtube:"UB1O30fR-EE", desc:"Learn HTML from scratch." },
  { id:2, title:"CSS Full Course", category:"Coding", youtube:"1Rs2ND1ryYc", desc:"Modern responsive web design." },
  { id:3, title:"JavaScript Full Course", category:"Coding", youtube:"hdI2bqOjy3c", desc:"Master JavaScript development." },
  { id:4, title:"React Full Course", category:"Coding", youtube:"bMknfKXIFA8", desc:"Build modern React apps." },
  { id:5, title:"Python Full Course", category:"Coding", youtube:"rfscVS0vtbw", desc:"Python programming for beginners." },
  { id:6, title:"ChatGPT & AI Masterclass", category:"AI", youtube:"JTxsNm9IdYU", desc:"Learn AI prompting and automation." },
  { id:7, title:"Premiere Pro Full Course", category:"Video Editing", youtube:"8eDsvKwM40U", desc:"Professional editing in Premiere Pro." },
  { id:8, title:"Freelancing Beginner Guide", category:"Business", youtube:"jU2mJmQJQ1Q", desc:"Start freelancing online." }
];

let currentFilter = "All";

// Navigation
function goHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home').classList.add('active');
}

function goToCategories() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('categoriesPage').classList.add('active');
  renderCategories();
}

function goToCoursesPage() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('coursesPage').classList.add('active');
}

// Render Categories Page
function renderCategories() {
  const container = document.getElementById('categoryList');
  container.innerHTML = `
    <div class="category-card" onclick="showCategory('Coding')"><h2>💻</h2><h3>Coding</h3></div>
    <div class="category-card" onclick="showCategory('AI')"><h2>🤖</h2><h3>AI</h3></div>
    <div class="category-card" onclick="showCategory('Video Editing')"><h2>🎥</h2><h3>Video Editing</h3></div>
    <div class="category-card" onclick="showCategory('Business')"><h2>💼</h2><h3>Business</h3></div>
  `;
}

function showCategory(cat) {
  currentFilter = cat;
  goToCoursesPage();
  renderAllCourses();
}

// Render All Courses
function renderAllCourses() {
  const container = document.getElementById('courseList');
  container.innerHTML = "";

  const query = document.getElementById('searchInput').value.toLowerCase();

  const filtered = courses.filter(course => {
    const matchSearch = course.title.toLowerCase().includes(query);
    const matchFilter = currentFilter === "All" || course.category === currentFilter;
    return matchSearch && matchFilter;
  });

  filtered.forEach(course => {
    const div = document.createElement("div");
    div.className = "course-card";
    div.innerHTML = `
      <iframe src="https://www.youtube.com/embed/${course.youtube}" allowfullscreen></iframe>
      <div class="course-content">
        <span class="course-category">${course.category}</span>
        <h3>${course.title}</h3>
        <p class="course-desc">${course.desc}</p>
        <button onclick="event.stopImmediatePropagation(); showCourseDetail(${course.id})" style="width:100%; padding:12px; background:linear-gradient(135deg,#3b82f6,#8b5cf6); border:none; border-radius:12px; color:white; font-weight:600;">View Course</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
  btn.classList.add('active-filter');
  renderAllCourses();
}

function showCourseDetail(id) {
  const course = courses.find(c => c.id === id);
  if (!course) return;

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('courseDetail').classList.add('active');

  document.getElementById('detailContent').innerHTML = `
    <div style="max-width:1100px; margin:auto; background:rgba(255,255,255,0.05); border-radius:24px; overflow:hidden;">
      <iframe width="100%" height="420" src="https://www.youtube.com/embed/${course.youtube}" allowfullscreen></iframe>
      <div style="padding:32px 24px;">
        <span class="course-category">${course.category}</span>
        <h1 style="font-size:2.1rem; margin:20px 0 12px;">${course.title}</h1>
        <p style="color:#b8b8b8; font-size:1.05rem;">${course.desc}</p>
        <br><br>
        <button onclick="enroll(${course.id})" style="width:100%; padding:16px 32px; background:linear-gradient(135deg,#3b82f6,#8b5cf6); border:none; border-radius:16px; color:white; font-size:1.1rem;">
          Enroll Course
        </button>
      </div>
    </div>
  `;
}

function enroll(id) {
  alert("✅ Enrolled successfully!");
}

// Initialize
goHome();
</script>
</body>
</html>
